<header class="z-40 bg-slate-50/90 dark:bg-slate-950 backdrop-blur-xl shadow-md px-8 py-4 flex items-center justify-between">
  <div class="flex items-center gap-6 w-full max-w-3xl">
    <h1 class="text-xl font-bold tracking-tight text-slate-800 dark:text-slate-200">{{ page_title }}</h1>
    <div class="relative flex-1 max-w-xl">
      <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-700 dark:text-slate-200">search</span>
      <input type="text" placeholder="{{ t.search_placeholder }}" class="w-full rounded-full border-none bg-surface-container-high dark:bg-slate-800 py-2 pl-10 pr-4 text-sm text-slate-700 placeholder:text-slate-700 dark:text-slate-200 dark:placeholder:text-slate-200 focus:ring-2 focus:ring-secondary/50" />
    </div>
  </div>
  <div class="flex items-center gap-3">
    <button id="theme-toggle" type="button" class="h-10 w-10 rounded-full bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-300 grid place-items-center border-2 border-white dark:border-slate-600 shadow-sm hover:brightness-95 transition" aria-label="Toggle theme">
      <span id="theme-toggle-icon" class="material-symbols-outlined">dark_mode</span>
    </button>
    <a href="{{ toggle_lang_url }}" class="rounded-full border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 px-4 py-2 text-sm font-semibold text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-700 transition">{{ t.lang_toggle }}</a>
    {% if request.user.is_authenticated %}
    <a href="{% url 'ledger:logout' %}" class="rounded-full border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 px-4 py-2 text-sm font-semibold text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-700 transition">Sair</a>
    {% endif %}
    <button class="h-10 w-10 rounded-full bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-300 grid place-items-center border border-slate-200 dark:border-slate-600 shadow-sm transition-colors relative">
      <span class="material-symbols-outlined">notifications</span>
      <span class="absolute top-2 right-2 w-2 h-2 bg-error rounded-full"></span>
    </button>
    {% if request.user.is_authenticated %}
    <a href="{% url 'ledger:profile' %}" title="{{ request.user.first_name|default:request.user.username }}" class="h-10 w-10 rounded-full bg-primary-container dark:bg-slate-700 text-white dark:text-slate-200 grid place-items-center text-sm font-semibold border-2 border-white dark:border-slate-600 shadow-sm hover:bg-primary dark:hover:bg-slate-600 transition">
      {{ request.user.first_name|default:request.user.username|slice:":1"|upper }}
    </a>
    {% else %}
    <div class="h-10 w-10 rounded-full bg-primary-container dark:bg-slate-700 overflow-hidden border-2 border-white dark:border-slate-600 shadow-sm"></div>
    {% endif %}
  </div>
</header>
