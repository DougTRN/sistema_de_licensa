  <nav class="flex-1 space-y-1">
    <a href="/" class="flex items-center gap-3 rounded-xl px-4 py-3 font-medium transition-colors duration-200 {% if active_page == 'dashboard' %}bg-white text-blue-900 shadow-sm{% else %}text-slate-600 hover:text-blue-900 hover:bg-slate-200{% endif %}">
      <span class="material-symbols-outlined">dashboard</span>
      {{ t.nav_dashboard }}
    </a>
    <a href="/invoices/" class="flex items-center gap-3 rounded-xl px-4 py-3 font-medium transition-colors duration-200 {% if active_page == 'invoices' %}bg-white text-blue-900 shadow-sm{% else %}text-slate-600 hover:text-blue-900 hover:bg-slate-200{% endif %}">

    <a href="/licenses/" class="flex items-center gap-3 rounded-xl px-4 py-3 font-medium transition-colors duration-200 {% if active_page == 'licenses' %}bg-white text-blue-900 shadow-sm{% else %}text-slate-600 hover:text-blue-900 hover:bg-slate-200{% endif %}">
