{% extends "ledger/base.html" %}
{% block content %}
<div class="min-h-screen flex items-center justify-center bg-slate-100 px-4 py-16">
  <div class="w-full max-w-md space-y-8 bg-slate-50 p-10 rounded-3xl shadow-editorial border border-slate-200">
    <div class="text-center">
      <p class="text-sm font-semibold uppercase tracking-[0.28em] text-slate-500">{{ page_title }}</p>
      <h1 class="mt-4 text-3xl font-bold text-slate-900">{{ page_title }}</h1>
      <p class="mt-3 text-sm text-slate-600">{{ page_subtitle }}</p>
    </div>

    {% if form.errors %}
    <div class="rounded-2xl border border-rose-200 bg-rose-50 p-4 text-sm text-rose-800">
      {{ form.errors.as_text|striptags }}
    </div>
    {% endif %}

    <form method="post" class="space-y-6">
      {% csrf_token %}
      <div>
        <label for="id_email" class="block text-sm font-semibold text-slate-700 mb-2">{{ reset_password_email_label }}</label>
        <input id="id_email" name="email" type="email" required class="w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm text-slate-900 focus:border-secondary focus:outline-none focus:ring-2 focus:ring-secondary/20" value="{{ form.email.value|default:'' }}" />
      </div>
      <button type="submit" class="w-full rounded-2xl bg-slate-800 px-4 py-3 text-sm font-semibold text-white hover:bg-slate-900 transition">{{ reset_password_button }}</button>
    </form>

    <p class="text-center text-sm text-slate-500">
      <a href="{% url 'ledger:login' %}" class="font-semibold text-slate-800 hover:underline">{{ reset_password_back_login }}</a>
    </p>
  </div>
</div>
{% endblock %}
